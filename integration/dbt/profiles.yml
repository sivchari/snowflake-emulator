snowflake_emulator:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: localhost
      user: test_user
      password: test_password
      database: test_db
      schema: public
      warehouse: test_wh
      host: localhost
      port: 8080
      protocol: http
      insecure_mode: true
      client_session_keep_alive: false
      connect_retries: 0
      connect_timeout: 10
      retry_on_database_errors: false
      retry_all: false
